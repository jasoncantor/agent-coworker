appId: com.cowork.desktop
productName: Cowork
asar: true
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: ../../dist
    to: dist
  - from: resources/binaries
    to: binaries
afterSign: scripts/notarize.cjs
publish:
  provider: github
  owner: mweinbach
  repo: agent-coworker
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  notarize: false
  gatekeeperAssess: false
  extendInfo:
    NSLocalNetworkUsageDescription: Cowork discovers nearby iPhones and relay peers on your local network.
    NSBonjourServices:
      - _cowrelay._tcp
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
win:
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  target:
    - nsis
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
